<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>软通新闻智能整理器</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 min-h-screen p-4 md:p-6">
    <div class="max-w-7xl mx-auto">
        <!-- 标题 -->
        <h1 class="text-[clamp(1.5rem,3vw,2.2rem)] font-bold text-center text-blue-700 mb-6">软通新闻智能整理器</h1>

        <!-- 主体分区 -->
        <div class="grid md:grid-cols-2 gap-6 mb-6">
            <!-- 新闻输入区域 -->
            <div class="bg-white p-4 rounded-lg shadow-md">
                <h2 class="text-lg font-semibold mb-3">新闻内容输入</h2>
                <textarea id="newsInput" class="w-full h-72 border border-gray-300 rounded p-2 resize-none" 
                placeholder="请粘贴近30天新闻内容，多篇新闻之间使用空行分隔（支持20篇以上内容）"></textarea>
                <div class="flex gap-3 mt-4">
                    <button id="sortBtn" class="bg-blue-600 text-white px-5 py-2 rounded hover:bg-blue-700 transition">
                        AI 智能整理
                    </button>
                    <button id="demoBtn" class="bg-gray-500 text-white px-5 py-2 rounded hover:bg-gray-600 transition">
                        加载20篇示例新闻
                    </button>
                    <button id="clearBtn" class="bg-red-500 text-white px-5 py-2 rounded hover:bg-red-600 transition">
                        清空内容
                    </button>
                </div>
            </div>

            <!-- 数据统计区域 -->
            <div class="bg-white p-4 rounded-lg shadow-md">
                <h2 class="text-lg font-semibold mb-3">整理结果概览</h2>
                <div class="space-y-3 text-base">
                    <p>📰 新闻总篇数：<span id="totalCount" class="font-bold text-blue-600">0</span> 篇</p>
                    <p>📅 时间范围：<span id="dateRange" class="font-bold">-</span></p>
                    <p>🏷️ 高频关键词：<span id="hotKeys" class="font-bold text-orange-600">-</span></p>
                </div>
                <div class="mt-5">
                    <input type="text" id="searchInput" placeholder="搜索标题/关键词筛选新闻" 
                    class="w-full border border-gray-300 rounded p-2">
                </div>
            </div>
        </div>

        <!-- 新闻列表展示区 -->
        <div class="bg-white p-4 rounded-lg shadow-md">
            <h2 class="text-lg font-semibold mb-4">新闻详情列表</h2>
            <div id="newsList" class="space-y-4"></div>
        </div>
    </div>

    <script>
        // 20篇软通示例新闻数据
        const demoNewsData = `

2026-05-20 软通智脑行业大模型V2.0版本全新上线
迭代后的大模型强化金融、制造、政务场景适配能力，支持私有化部署，适配国内政企安全合规要求。

作为核心参编单位，输出模型安全、数据安全、应用安全等落地规范，推动AI行业健康发展。

业务覆盖国内及海外多地区，成为国内出海IT服务标杆企业之一。

2026-05-17 智能客服解决方案落地大型保险企业
AI客服实现95%常见问题自动应答，有效降低人工成本，同时提升客户服务满意度。

完成上百款行业应用适配改造，推出全套国产化替代解决方案，助力信创产业发展。

2026-05-10 发布《2026企业数字化转型白皮书》

2026-05-07 启动千企AI赋能计划，助力中小企业数字化

        `.trim();

        let newsDataset = [];

        // 解析新闻文本
        function parseNews(text) {
            const blocks = text.split(/\n\s*\n/).filter(item => item.trim());
            const result = [];
            blocks.forEach(block => {
                const lines = block.trim().split('\n');
                let date = "", title = "", content = "";
                // 匹配日期格式
                if (/^\d{4}-\d{2}-\d{2}/.test(lines[0])) {
                    const firstLineArr = lines[0].split(' ');
                    date = firstLineArr[0];
                    title = firstLineArr.slice(1).join(' ');
                    content = lines.slice(1).join(' ');
                } else {
                    title = lines[0];
                    content = lines.slice(1).join(' ');
                }
                // 简易关键词提取
                const wordList = (title + content).replace(/[，。、；：？！]/g, ' ').split(' ').filter(w => w.length >= 2);
                const keywords = [...new Set(wordList)].slice(0, 5);
                result.push({ date, title, content, keywords });
            });
            return result;
        }

        // 渲染统计信息
        function renderSummary(list) {
            const total = list.length;
            document.getElementById('totalCount').innerText = total;

            const dateList = list.map(item => item.date).filter(d => d);
            let dateRange = "-";
            if (dateList.length) {
                dateRange = `${dateList[0]} ~ ${dateList[dateList.length - 1]}`;
            }
            document.getElementById('dateRange').innerText = dateRange;

            // 统计高频词
            const allKeys = [];
            list.forEach(item => allKeys.push(...item.keywords));
            const freqMap = {};
            allKeys.forEach(word => freqMap[word] = (freqMap[word] || 0) + 1);
            const hotWords = Object.entries(freqMap)
                .sort((a, b) => b[1] - a[1])
                .slice(0, 6)
                .map(item => item[0]);
            document.getElementById('hotKeys').innerText = hotWords.join('、') || "-";
        }

        // 渲染新闻列表
        function renderNews(list, filter = "") {
            const container = document.getElementById('newsList');
            const filterList = list.filter(item => {
                return item.title.includes(filter) || item.keywords.some(k => k.includes(filter));
            });
            let html = "";
            filterList.forEach(item => {
                html += `
                <div class="border border-gray-200 rounded p-4 hover:shadow-sm transition">
                    <div class="flex justify-between items-center mb-2">
                        <h3 class="font-semibold text-lg">${item.title}</h3>
                        <span class="text-sm text-gray-500">${item.date || "未知日期"}</span>
                    </div>
                    <p class="text-gray-700 text-sm mb-2">${item.content}</p>
                    <p class="text-xs text-blue-500">关键词：${item.keywords.join('、')}</p>
                </div>
                `;
            });
            container.innerHTML = html;
        }

        // 绑定按钮事件
        document.getElementById('sortBtn').addEventListener('click', () => {
            const inputVal = document.getElementById('newsInput').value;
            newsDataset = parseNews(inputVal);
            renderSummary(newsDataset);
            renderNews(newsDataset);
        });

        document.getElementById('demoBtn').addEventListener('click', () => {
            document.getElementById('newsInput').value = demoNewsData;
            newsDataset = parseNews(demoNewsData);
            renderSummary(newsDataset);
            renderNews(newsDataset);
        });

        document.getElementById('clearBtn').addEventListener('click', () => {
            document.getElementById('newsInput').value = "";
            document.getElementById('newsList').innerHTML = "";
            document.getElementById('totalCount').innerText = "0";
            document.getElementById('dateRange').innerText = "-";
            document.getElementById('hotKeys').innerText = "-";
        });

        document.getElementById('searchInput').addEventListener('input', (e) => {
            renderNews(newsDataset, e.target.value.trim());
        });
    </script>
</body>
</html>
